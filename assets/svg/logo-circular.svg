<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <linearGradient id="warmGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4A0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emp2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B84D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4872A;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circle background -->
  <circle cx="250" cy="150" r="140" fill="url(#warmGrad2)" stroke="#C4872A" stroke-width="3"/>
  <circle cx="250" cy="150" r="130" fill="none" stroke="#D4A054" stroke-width="1" stroke-dasharray="4,6"/>
  
  <!-- Large empanada centerpiece -->
  <g transform="translate(175, 90)" filter="url(#glow)">
    <path d="M0,50 Q75,-30 150,50 Q75,65 0,50Z" fill="url(#emp2)" stroke="#8B6914" stroke-width="2"/>
    <!-- Crimped edge detail -->
    <path d="M8,48 Q15,38 22,48 Q29,38 36,48 Q43,38 50,48 Q57,38 64,48 Q71,38 78,48 Q85,38 92,48 Q99,38 106,48 Q113,38 120,48 Q127,38 134,48 Q141,38 143,47" fill="none" stroke="#A87D32" stroke-width="1.5"/>
    <!-- Steam lines -->
    <g stroke="#8B6914" stroke-width="1.2" fill="none" opacity="0.4">
      <path d="M55,5 Q50,-5 55,-15 Q60,-25 55,-35">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M75,0 Q70,-10 75,-20 Q80,-30 75,-40">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <path d="M95,5 Q90,-5 95,-15 Q100,-25 95,-35">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- Brand text -->
  <text x="250" y="185" text-anchor="middle" font-family="'Brush Script MT', 'Segoe Script', cursive" font-size="42" fill="#8B2500" font-weight="bold">Dulce</text>
  <text x="250" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#C4872A" font-style="italic">&amp;</text>
  <text x="250" y="238" text-anchor="middle" font-family="'Brush Script MT', 'Segoe Script', cursive" font-size="42" fill="#8B2500" font-weight="bold">Salado</text>
  
  <!-- Bottom tagline arc -->
  <text x="250" y="268" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6B4226" letter-spacing="3">SABOR QUE TE RECONFORTA</text>
</svg>