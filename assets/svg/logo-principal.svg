<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB830;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="empGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A054;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  
  <!-- Background plate -->
  <rect x="10" y="10" width="480" height="280" rx="20" ry="20" fill="#FFF8E7" stroke="#D4A054" stroke-width="3"/>
  
  <!-- Decorative border -->
  <rect x="20" y="20" width="460" height="260" rx="15" ry="15" fill="none" stroke="#FFB830" stroke-width="1.5" stroke-dasharray="8,4"/>
  
  <!-- Sun icon - top left -->
  <g transform="translate(90, 55)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="18" fill="url(#sunGrad)"/>
    <!-- Sun rays -->
    <g stroke="#FFB830" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-25" x2="0" y2="-30"/>
      <line x1="17" y1="-17" x2="21" y2="-21"/>
      <line x1="25" y1="0" x2="30" y2="0"/>
      <line x1="17" y1="17" x2="21" y2="21"/>
      <line x1="0" y1="25" x2="0" y2="30"/>
      <line x1="-17" y1="17" x2="-21" y2="21"/>
      <line x1="-25" y1="0" x2="-30" y2="0"/>
      <line x1="-17" y1="-17" x2="-21" y2="-21"/>
    </g>
    <!-- Smile on sun -->
    <path d="M-7,3 Q0,12 7,3" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-5" cy="-3" r="2" fill="#8B4513"/>
    <circle cx="5" cy="-3" r="2" fill="#8B4513"/>
  </g>
  
  <!-- Brand Name - Left aligned -->
  <text x="60" y="115" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="#8B2500" letter-spacing="2">DULCE</text>
  <text x="60" y="148" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#D4A054" font-style="italic" letter-spacing="4">y</text>
  <text x="60" y="185" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="#8B2500" letter-spacing="2">SALADO</text>
  
  <!-- Large empanada on right side -->
  <g transform="translate(300, 80)" filter="url(#shadow)">
    <path d="M0,60 Q45,-30 90,60 Q45,75 0,60Z" fill="url(#empGrad)" stroke="#8B6914" stroke-width="1.5"/>
    <path d="M5,58 Q12,48 19,58 Q26,48 33,58 Q40,48 47,58 Q54,48 61,58 Q68,48 75,58 Q82,48 86,57" fill="none" stroke="#A0722A" stroke-width="1"/>
    <!-- Steam -->
    <g stroke="#8B6914" stroke-width="1" fill="none" opacity="0.35">
      <path d="M30,15 Q25,5 30,-5 Q35,-15 30,-25"/>
      <path d="M45,10 Q40,0 45,-10 Q50,-20 45,-30"/>
      <path d="M60,15 Q55,5 60,-5 Q65,-15 60,-25"/>
    </g>
  </g>
  <!-- Small empanada below -->
  <g transform="translate(370, 155)" filter="url(#shadow)">
    <path d="M0,35 Q25,-15 50,35 Q25,45 0,35Z" fill="url(#empGrad)" stroke="#8B6914" stroke-width="1"/>
    <path d="M4,33 Q8,27 12,33 Q16,27 20,33 Q24,27 28,33 Q32,27 36,33 Q40,27 44,33 Q46,28 47,34" fill="none" stroke="#A0722A" stroke-width="0.8"/>
  </g>
  
  <!-- Decorative line -->
  <line x1="40" y1="200" x2="260" y2="200" stroke="#D4A054" stroke-width="1.5"/>
  
  <!-- Tagline -->
  <text x="60" y="225" text-anchor="start" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#6B4226" letter-spacing="3" font-weight="600">EMPANADAS RECIÉN HECHAS</text>
  <text x="60" y="248" text-anchor="start" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8B6914" letter-spacing="2">FRESHLY BAKED EMPANADAS</text>
  
  <!-- Leaf decorations near logo -->
  <g transform="translate(55, 90) rotate(-30)">
    <path d="M0,0 Q5,-8 10,0 Q5,2 0,0Z" fill="#6B8E23" opacity="0.7"/>
  </g>
  <g transform="translate(120, 90) rotate(30)">
    <path d="M0,0 Q5,-8 10,0 Q5,2 0,0Z" fill="#6B8E23" opacity="0.7"/>
  </g>
  
  <!-- NYC reference -->
  <text x="60" y="270" text-anchor="start" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#A0722A" letter-spacing="5">NEW YORK CITY</text>
  
  <!-- Menu items on the right -->
  <text x="310" y="220" text-anchor="start" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6B4226">🐔 Pollo  •  🥩 Carne  •  🧀 Queso</text>
  <text x="310" y="240" text-anchor="start" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6B4226">🍈 Guayaba con Queso</text>
  <text x="310" y="258" text-anchor="start" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6B4226">☕ Café  •  🧃 Jugo Maracuyá</text>
</svg>