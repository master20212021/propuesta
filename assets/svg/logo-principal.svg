<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB830;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="empGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A054;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  
  <!-- Background plate -->
  <rect x="10" y="10" width="480" height="280" rx="20" ry="20" fill="#FFF8E7" stroke="#D4A054" stroke-width="3"/>
  
  <!-- Decorative border -->
  <rect x="20" y="20" width="460" height="260" rx="15" ry="15" fill="none" stroke="#FFB830" stroke-width="1.5" stroke-dasharray="8,4"/>
  
  <!-- Sun icon -->
  <g transform="translate(250, 55)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="18" fill="url(#sunGrad)"/>
    <!-- Sun rays -->
    <g stroke="#FFB830" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-25" x2="0" y2="-30"/>
      <line x1="17" y1="-17" x2="21" y2="-21"/>
      <line x1="25" y1="0" x2="30" y2="0"/>
      <line x1="17" y1="17" x2="21" y2="21"/>
      <line x1="0" y1="25" x2="0" y2="30"/>
      <line x1="-17" y1="17" x2="-21" y2="21"/>
      <line x1="-25" y1="0" x2="-30" y2="0"/>
      <line x1="-17" y1="-17" x2="-21" y2="-21"/>
    </g>
    <!-- Smile on sun -->
    <path d="M-7,3 Q0,12 7,3" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-5" cy="-3" r="2" fill="#8B4513"/>
    <circle cx="5" cy="-3" r="2" fill="#8B4513"/>
  </g>
  
  <!-- Brand Name -->
  <text x="250" y="115" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="#8B2500" letter-spacing="2">DULCE</text>
  <text x="250" y="148" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#D4A054" font-style="italic" letter-spacing="4">y</text>
  <text x="250" y="185" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="#8B2500" letter-spacing="2">SALADO</text>
  
  <!-- Empanada icons -->
  <g transform="translate(90, 135)" filter="url(#shadow)">
    <path d="M0,0 Q15,-20 30,0 Q15,5 0,0Z" fill="url(#empGrad)" stroke="#8B6914" stroke-width="1"/>
    <!-- Crimped edge -->
    <path d="M2,-1 Q5,-3 8,-1 Q11,-3 14,-1 Q17,-3 20,-1 Q23,-3 26,-1 Q29,-3 28,0" fill="none" stroke="#A0722A" stroke-width="0.8"/>
  </g>
  <g transform="translate(375, 135)" filter="url(#shadow)">
    <path d="M0,0 Q15,-20 30,0 Q15,5 0,0Z" fill="url(#empGrad)" stroke="#8B6914" stroke-width="1"/>
    <path d="M2,-1 Q5,-3 8,-1 Q11,-3 14,-1 Q17,-3 20,-1 Q23,-3 26,-1 Q29,-3 28,0" fill="none" stroke="#A0722A" stroke-width="0.8"/>
  </g>
  
  <!-- Decorative line -->
  <line x1="100" y1="200" x2="400" y2="200" stroke="#D4A054" stroke-width="1.5"/>
  <circle cx="250" cy="200" r="4" fill="#FFB830"/>
  
  <!-- Tagline -->
  <text x="250" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#6B4226" letter-spacing="3" font-weight="600">EMPANADAS RECIÉN HECHAS</text>
  <text x="250" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8B6914" letter-spacing="2">FRESHLY BAKED EMPANADAS</text>
  
  <!-- Leaf decorations -->
  <g transform="translate(125, 90) rotate(-30)">
    <path d="M0,0 Q5,-8 10,0 Q5,2 0,0Z" fill="#6B8E23" opacity="0.7"/>
  </g>
  <g transform="translate(365, 90) rotate(30)">
    <path d="M0,0 Q5,-8 10,0 Q5,2 0,0Z" fill="#6B8E23" opacity="0.7"/>
  </g>
  <g transform="translate(135, 95) rotate(-50)">
    <path d="M0,0 Q4,-6 8,0 Q4,2 0,0Z" fill="#6B8E23" opacity="0.6"/>
  </g>
  <g transform="translate(358, 95) rotate(50)">
    <path d="M0,0 Q4,-6 8,0 Q4,2 0,0Z" fill="#6B8E23" opacity="0.6"/>
  </g>
  
  <!-- NYC reference -->
  <text x="250" y="270" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#A0722A" letter-spacing="5">NEW YORK CITY</text>
</svg>